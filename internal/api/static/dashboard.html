<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ACH Orchestrator — Payment Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

:root {
  --bg:            #0d0608;
  --bg2:           #110809;
  --surface:       #180c0e;
  --surface2:      #1f1014;
  --surface3:      #261419;
  --border:        #3a1c22;
  --border2:       #4d2530;

  --rose:          #e8547a;
  --rose-bright:   #f472a0;
  --rose-dim:      rgba(232, 84, 122, 0.15);
  --rose-glow:     rgba(232, 84, 122, 0.08);
  --blush:         #c2637e;

  --text:          #d4b0bc;
  --text-dim:      #9a6d7a;
  --text-bright:   #f0dce4;
  --text-key:      #c49aaa;

  --green:         #7ecfa0;
  --green-dim:     rgba(126, 207, 160, 0.12);
  --red:           #e8547a;
  --red-dim:       rgba(232, 84, 122, 0.15);
  --orange:        #e8956a;
  --orange-dim:    rgba(232, 149, 106, 0.13);
  --blue:          #a87ecf;
  --blue-dim:      rgba(168, 126, 207, 0.13);
  --yellow:        #cfb67e;
  --yellow-dim:    rgba(207, 182, 126, 0.13);

  --font-mono:     'DM Mono', monospace;
  --font-display:  'Inter', sans-serif;
  --font-body:     'Inter', sans-serif;

  --scale:         0.85vw;
  --radius-sm:     0.3vw;
  --radius-md:     0.5vw;
  --radius-lg:     0.7vw;
  --pad-card:      1.1vw;
  --pad-page:      1.7vw;
  --gap:           1vw;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: clamp(11px, 0.72vw, 15px);
  line-height: 1.6;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 20%, rgba(140,30,60,0.35) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 20% 80%, rgba(100,20,45,0.25) 0%, transparent 55%),
    radial-gradient(ellipse 60% 50% at 85% 75%, rgba(80,15,35,0.2)  0%, transparent 50%),
    radial-gradient(ellipse 30% 30% at 40% 40%, rgba(180,50,90,0.1)  0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

#sparkle-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.85vw var(--pad-page);
  border-bottom: 1px solid var(--border);
  background: rgba(18,8,10,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: sticky;
  top: 0;
  z-index: 100;
  width: 100%;
}

.logo { display: flex; align-items: center; gap: 0.65vw; }
.logo-text { display: flex; flex-direction: column; gap: 1px; }
.logo-mark {
  width: 1.6vw; height: 1.6vw;
  min-width: 24px; min-height: 24px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, #8c1e3c 0%, #e8547a 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-size: clamp(11px, 0.75vw, 16px);
  color: #fff; font-weight: 600;
  box-shadow: 0 0 1vw rgba(232,84,122,0.4), 0 2px 8px rgba(0,0,0,0.4);
  flex-shrink: 0;
}
.logo-title {
  font-family: var(--font-mono);
  font-size: clamp(9px, 0.6vw, 13px);
  font-weight: 500; letter-spacing: 0.12em;
  color: var(--text-bright); text-transform: uppercase;
}
.logo-sub {
  font-family: var(--font-mono);
  font-size: clamp(8px, 0.48vw, 10px);
  letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase;
}
.header-right {
  display: flex; align-items: center;
  gap: 1.4vw;
  font-family: var(--font-mono);
  font-size: clamp(8px, 0.52vw, 11px);
}
.live-indicator { display: flex; align-items: center; gap: 0.35vw; color: var(--rose); }
.live-dot {
  width: 0.35vw; height: 0.35vw;
  min-width: 5px; min-height: 5px;
  border-radius: 50%;
  background: var(--rose);
  box-shadow: 0 0 6px var(--rose), 0 0 12px rgba(232,84,122,0.4);
  animation: livepulse 2s ease-in-out infinite;
}
@keyframes livepulse {
  0%,100% { opacity:1; transform:scale(1); box-shadow: 0 0 6px var(--rose), 0 0 12px rgba(232,84,122,0.4); }
  50%      { opacity:0.6; transform:scale(0.85); box-shadow: 0 0 3px var(--rose); }
}
#last-updated { color: var(--text-dim); }
#refresh-countdown { color: var(--blush); min-width: 5vw; text-align: right; }

/* ── Main ── */
main {
  padding: 1.5vw var(--pad-page);
  width: 100%;
  position: relative;
  z-index: 2;
}

/* ── Section label ── */
.section-label {
  font-family: var(--font-display);
  font-size: clamp(14px, 1.2vw, 26px);
  font-weight: 300;
  color: var(--text-bright);
  letter-spacing: 0.02em;
  margin-bottom: 1vw;
  display: flex; align-items: baseline; gap: 0.7vw;
}
.section-label::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* ── Summary pills ── */
#summary-bar {
  display: flex; flex-wrap: wrap;
  gap: 0.5vw;
  margin-bottom: 1.2vw;
}
.state-pill {
  display: flex; align-items: center; gap: 0.6vw;
  padding: 0.45vw 0.9vw;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: rgba(24,12,14,0.8);
  backdrop-filter: blur(8px);
  font-family: var(--font-mono);
  font-size: clamp(8px, 0.5vw, 10px);
  font-weight: 500; letter-spacing: 0.05em;
}
.state-pill .pill-count {
  font-family: var(--font-display);
  font-size: clamp(13px, 1vw, 20px);
  font-weight: 300; line-height: 1;
}
.state-pill .pill-label { color: var(--text-key); font-size: clamp(7px, 0.44vw, 9px); letter-spacing: 0.1em; text-transform: uppercase; }
.pill-green  { border-left: 2px solid var(--green);  } .pill-green  .pill-count { color: var(--green);  }
.pill-red    { border-left: 2px solid var(--red);    } .pill-red    .pill-count { color: var(--red);    }
.pill-orange { border-left: 2px solid var(--orange); } .pill-orange .pill-count { color: var(--orange); }
.pill-blue   { border-left: 2px solid var(--blue);   } .pill-blue   .pill-count { color: var(--blue);   }
.pill-yellow { border-left: 2px solid var(--yellow); } .pill-yellow .pill-count { color: var(--yellow); }

/* ── Card ── */
.card {
  background: rgba(20,10,12,0.75);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  box-shadow: 0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 var(--rose-glow);
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.75vw var(--pad-card);
  border-bottom: 1px solid var(--border);
  background: rgba(30,14,18,0.6);
}
.card-title {
  font-family: var(--font-mono);
  font-size: clamp(8px, 0.52vw, 11px);
  font-weight: 500; letter-spacing: 0.14em;
  color: var(--rose); text-transform: uppercase;
}
#payment-count {
  font-family: var(--font-mono);
  font-size: clamp(8px, 0.52vw, 11px);
  color: var(--text-dim);
}

/* ── Table ── */
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 0.55vw 0.9vw;
  text-align: left;
  font-family: var(--font-mono);
  font-size: clamp(7px, 0.44vw, 9px);
  font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-key);
  border-bottom: 1px solid var(--border);
  background: rgba(26,12,16,0.5);
  white-space: nowrap;
}
tbody tr.payment-row {
  border-bottom: 1px solid rgba(58,28,34,0.5);
  cursor: pointer;
  transition: background 0.12s;
}
tbody tr.payment-row:last-child { border-bottom: none; }
tbody tr.payment-row:hover { background: rgba(232,84,122,0.04); }
tbody tr.payment-row.expanded { background: rgba(232,84,122,0.05); }

tbody td {
  padding: 0.65vw 0.9vw;
  font-family: var(--font-mono);
  font-size: clamp(9px, 0.57vw, 12px);
  color: var(--text);
  vertical-align: middle;
  white-space: nowrap;
}
td.id-col   { color: var(--text-dim); font-size: clamp(8px, 0.5vw, 10px); letter-spacing: 0.06em; }
td.amt-col  { font-family: var(--font-display); font-size: clamp(11px, 0.75vw, 15px); font-weight: 300; color: var(--text-bright); }
td.exp-col  { width: 2vw; color: var(--text-dim); font-size: clamp(8px, 0.5vw, 10px); text-align: center; opacity: 0.5; }
tbody tr.payment-row:hover td.exp-col { opacity: 1; color: var(--rose); }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 0.25vw;
  padding: 0.18vw 0.5vw;
  border-radius: 0.2vw;
  font-family: var(--font-mono);
  font-size: clamp(7px, 0.44vw, 9px);
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;
}
.badge-dot { width: clamp(3px,0.25vw,5px); height: clamp(3px,0.25vw,5px); border-radius: 50%; background: currentColor; flex-shrink: 0; }
.badge-green  { color: var(--green);  background: var(--green-dim);  }
.badge-red    { color: var(--red);    background: var(--red-dim);    }
.badge-orange { color: var(--orange); background: var(--orange-dim); }
.badge-blue   { color: var(--blue);   background: var(--blue-dim);   }
.badge-yellow { color: var(--yellow); background: var(--yellow-dim); }

/* ── Audit row ── */
tr.audit-row td { padding: 0; background: rgba(12,6,8,0.92); }
.audit-inner { padding: 0.9vw 1.1vw 1.2vw; border-top: 1px solid var(--border); }
.audit-title {
  font-family: var(--font-mono); color: var(--text-dim);
  font-size: clamp(7px, 0.44vw, 9px); letter-spacing: 0.14em;
  text-transform: uppercase; margin-bottom: 0.7vw; font-weight: 500;
}
.audit-tbl { width: 100%; border-collapse: collapse; }
.audit-tbl th {
  padding: 0.35vw 0.75vw; text-align: left;
  font-size: clamp(7px, 0.42vw, 9px); letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--text-key); border-bottom: 1px solid var(--border);
  font-weight: 500; font-family: var(--font-mono);
  background: rgba(30,14,18,0.4);
}
.audit-tbl td {
  padding: 0.45vw 0.75vw; font-size: clamp(8px, 0.5vw, 10px);
  color: var(--text); border-bottom: 1px solid rgba(58,28,34,0.4);
  white-space: nowrap; font-family: var(--font-mono);
}
.audit-tbl tr:last-child td { border-bottom: none; }
.audit-arrow { color: var(--rose); opacity: 0.6; }
.audit-reason { color: var(--text-dim); }
.audit-loading, .audit-empty { color: var(--text-dim); padding: 0.5vw 0; font-family: var(--font-mono); font-size: clamp(8px,0.5vw,10px); }
.audit-error  { color: var(--red);      padding: 0.5vw 0; font-family: var(--font-mono); font-size: clamp(8px,0.5vw,10px); }

/* ── Status message ── */
#status-message {
  display: none; padding: 2.5vw;
  text-align: center; font-family: var(--font-mono);
  font-size: clamp(9px, 0.57vw, 12px); color: var(--text-dim); letter-spacing: 0.06em;
}
#status-message.error { color: var(--red); }
#status-message.show  { display: block; }

/* ── Footer ── */
footer {
  padding: 1vw var(--pad-page);
  border-top: 1px solid var(--border);
  font-family: var(--font-mono);
  font-size: clamp(7px, 0.44vw, 9px);
  color: var(--text-dim); letter-spacing: 0.1em;
  text-transform: uppercase;
  position: relative; z-index: 2;
}

@keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
.refreshing { animation: shimmer 0.35s ease; }
</style>
</head>
<body>

<canvas id="sparkle-canvas"></canvas>

<header>
  <div class="logo">
    <div class="logo-mark">✦</div>
    <div class="logo-text">
      <div class="logo-title">ACH Orchestrator</div>
      <div class="logo-sub">Payment Dashboard · Live</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-indicator">
      <div class="live-dot"></div>
      <span>LIVE</span>
    </div>
    <span id="last-updated">—</span>
    <span id="refresh-countdown">next in 3s</span>
  </div>
</header>

<main>
  <div class="section-label">Payment States</div>
  <div id="summary-bar"></div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">✦ Payments</span>
      <span id="payment-count">—</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Amount</th>
          <th>State</th>
          <th>Return Code</th>
          <th>Repr. Count</th>
          <th>Created At</th>
          <th>Updated At</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="payments-tbody"></tbody>
    </table>
    <div id="status-message"></div>
  </div>
</main>

<footer>ACH Orchestrator · Payment Dashboard · Dark Rose · Tanisha Dutta</footer>

<script>
(function() {
  const canvas = document.getElementById('sparkle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  const COLORS = ['rgba(232,84,122,','rgba(244,114,160,','rgba(194,99,126,','rgba(240,220,228,','rgba(168,126,207,','rgba(255,255,255,'];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function mkStar() { return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.2+0.2, a:Math.random(), da:(Math.random()*0.008+0.002)*(Math.random()<0.5?1:-1), col:COLORS[Math.floor(Math.random()*COLORS.length)], cross:Math.random()<0.18, cr:Math.random()*5+3 }; }
  function drawCross(s) {
    ctx.save(); ctx.translate(s.x,s.y); ctx.globalAlpha=s.a*0.9;
    ctx.strokeStyle=s.col+'1)'; ctx.lineWidth=0.5;
    ctx.beginPath(); ctx.moveTo(-s.cr,0); ctx.lineTo(s.cr,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-s.cr); ctx.lineTo(0,s.cr); ctx.stroke();
    const d=s.cr*0.5; ctx.lineWidth=0.3; ctx.globalAlpha=s.a*0.5;
    ctx.beginPath(); ctx.moveTo(-d,-d); ctx.lineTo(d,d); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(d,-d); ctx.lineTo(-d,d); ctx.stroke();
    ctx.restore();
  }
  function frame() {
    ctx.clearRect(0,0,W,H);
    for(const s of stars){
      s.a+=s.da; if(s.a>1||s.a<0){s.da*=-1;s.a=Math.max(0,Math.min(1,s.a));}
      if(s.cross){drawCross(s);}else{ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.col+s.a.toFixed(2)+')';ctx.fill();}
    }
    requestAnimationFrame(frame);
  }
  resize();
  for(let i=0;i<160;i++) stars.push(mkStar());
  window.addEventListener('resize',()=>{resize();stars=[];for(let i=0;i<160;i++) stars.push(mkStar());});
  requestAnimationFrame(frame);
})();
</script>

<script>
(function () {
  const REFRESH_INTERVAL = 3000;
  const STATE_COLOR = {
    SETTLED:'green', FAILED_NON_RETRYABLE:'red', FAILED_RETRYABLE_EXHAUSTED:'red',
    COMPLIANCE_ESCALATION:'orange', INITIATED:'blue', PENDING:'blue', SUBMITTED:'blue', RETURNED:'yellow',
  };
  const PILL_ORDER = [
    ['SETTLED','green'],['INITIATED','blue'],['PENDING','blue'],['SUBMITTED','blue'],
    ['RETURNED','yellow'],['FAILED_NON_RETRYABLE','red'],['FAILED_RETRYABLE_EXHAUSTED','red'],['COMPLIANCE_ESCALATION','orange'],
  ];

  const tbody        = document.getElementById('payments-tbody');
  const summaryBar   = document.getElementById('summary-bar');
  const paymentCount = document.getElementById('payment-count');
  const lastUpdated  = document.getElementById('last-updated');
  const countdown    = document.getElementById('refresh-countdown');
  const statusMsg    = document.getElementById('status-message');
  const expanded     = new Set();
  let countdownVal = 3, countdownTimer = null, fetchTimer = null;

  function fmtTime(iso) {
    if (!iso) return '—';
    return new Date(iso).toISOString().replace('T',' ').substring(0,19)+' UTC';
  }

  function badge(state) {
    const c = 'badge-' + (STATE_COLOR[state] || 'blue');
    return `<span class="badge ${c}"><span class="badge-dot"></span>${state}</span>`;
  }

  function buildSummary(payments) {
    const counts = {};
    for (const p of payments) counts[p.state] = (counts[p.state]||0)+1;
    summaryBar.innerHTML = PILL_ORDER.filter(([s])=>counts[s]).map(([s,c])=>`
      <div class="state-pill pill-${c}">
        <span class="pill-count">${counts[s]}</span>
        <span class="pill-label">${s.replace(/_/g,'_\u200B')}</span>
      </div>`).join('');
  }

  function showStatus(msg, isError) {
    statusMsg.textContent = msg;
    statusMsg.className = 'show'+(isError?' error':'');
    tbody.innerHTML = '';
  }
  function hideStatus() { statusMsg.className = ''; }

  function buildRow(p) {
    const shortID = p.id ? p.id.substring(0,8) : '—';
    const isExp   = expanded.has(p.id);
    const tr = document.createElement('tr');
    tr.className = 'payment-row'+(isExp?' expanded':'');
    tr.dataset.id = p.id;
    tr.innerHTML = `
      <td class="id-col">${shortID}&hellip;</td>
      <td class="amt-col">${p.amount !== undefined ? '$'+p.amount : '—'}</td>
      <td>${badge(p.state)}</td>
      <td style="color:var(--text-dim)">${p.return_code || '—'}</td>
      <td style="color:var(--text-key);text-align:center">${p.representment_count !== undefined ? p.representment_count : '—'}</td>
      <td style="color:var(--text-dim)">${fmtTime(p.created_at)}</td>
      <td style="color:var(--text-dim)">${fmtTime(p.updated_at)}</td>
      <td class="exp-col">${isExp?'▲':'▼'}</td>`;
    tr.addEventListener('click', ()=>toggleAudit(p.id, tr));
    return tr;
  }

  function toggleAudit(id, tr) {
    const existing = document.getElementById('audit-'+id);
    if (existing) {
      existing.remove(); expanded.delete(id);
      tr.classList.remove('expanded');
      tr.querySelector('.exp-col').textContent='▼';
      return;
    }
    expanded.add(id);
    tr.classList.add('expanded');
    tr.querySelector('.exp-col').textContent='▲';

    const auditTr = document.createElement('tr');
    auditTr.className = 'audit-row';
    auditTr.id = 'audit-'+id;
    auditTr.innerHTML = `<td colspan="8"><div class="audit-inner">
      <div class="audit-title">✦ Audit Log — ${id}</div>
      <div class="audit-loading">Loading…</div>
    </div></td>`;
    tr.after(auditTr);

    fetch('/payments/'+id+'/audit')
      .then(r=>r.ok?r.json():Promise.reject(r.status))
      .then(entries=>{
        const inner = auditTr.querySelector('.audit-inner');
        if (!entries||entries.length===0) {
          inner.innerHTML=`<div class="audit-title">✦ Audit Log — ${id}</div><div class="audit-empty">No audit entries found.</div>`;
          return;
        }
        const rows = entries.map(e=>`<tr>
          <td style="color:var(--text-dim)">${fmtTime(e.created_at)}</td>
          <td>${badge(e.from_state||'—')}</td>
          <td class="audit-arrow">→</td>
          <td>${badge(e.to_state||'—')}</td>
          <td class="audit-reason">${e.reason||'—'}</td>
        </tr>`).join('');
        inner.innerHTML=`<div class="audit-title">✦ Audit Log — ${id}</div>
          <table class="audit-tbl">
            <thead><tr><th>Timestamp</th><th>From</th><th></th><th>To</th><th>Reason</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`;
      })
      .catch(err=>{
        auditTr.querySelector('.audit-inner').innerHTML=
          `<div class="audit-title">✦ Audit Log — ${id}</div><div class="audit-error">Failed to load (${err}).</div>`;
      });
  }

  function renderPayments(payments) {
    if (!payments||payments.length===0) {
      showStatus('No payments found.', false);
      buildSummary([]); paymentCount.textContent='0 payments'; return;
    }
    hideStatus();
    buildSummary(payments);
    paymentCount.textContent = payments.length+' payment'+(payments.length!==1?'s':'');
    const frag = document.createDocumentFragment();
    for (const p of payments) {
      frag.appendChild(buildRow(p));
      const ea = document.getElementById('audit-'+p.id);
      if (ea && expanded.has(p.id)) frag.appendChild(ea.cloneNode(true));
    }
    tbody.innerHTML='';
    tbody.appendChild(frag);
    tbody.classList.add('refreshing');
    setTimeout(()=>tbody.classList.remove('refreshing'), 350);
  }

  function fetchPayments() {
    fetch('/api/payments')
      .then(r=>r.ok?r.json():Promise.reject(r.status))
      .then(data=>{
        renderPayments(data);
        lastUpdated.textContent='Updated '+new Date().toISOString().substring(11,19)+' UTC';
      })
      .catch(err=>{ showStatus('Error fetching payments: '+err, true); lastUpdated.textContent='Last fetch failed'; })
      .finally(scheduleNext);
  }

  function scheduleNext() {
    clearInterval(countdownTimer); clearTimeout(fetchTimer);
    countdownVal=3; countdown.textContent='next in 3s';
    countdownTimer=setInterval(()=>{
      countdownVal--;
      countdown.textContent=countdownVal>0?'next in '+countdownVal+'s':'refreshing…';
      if(countdownVal<=0) clearInterval(countdownTimer);
    },1000);
    fetchTimer=setTimeout(fetchPayments, REFRESH_INTERVAL);
  }

  fetchPayments();
})();
</script>
</body>
</html>

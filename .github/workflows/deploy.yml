name: CI / CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  AWS_REGION:   us-east-1
  ECR_REPO:     ach-orchestrator
  ECS_CLUSTER:  ach-orchestrator
  SERVER_SVC:   ach-orchestrator-server
  WORKER_SVC:   ach-orchestrator-worker

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     achuser
          POSTGRES_PASSWORD: password
          POSTGRES_DB:       ach_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      temporal:
        image: temporalio/auto-setup:1.24
        env:
          DB:                sqlite
          SKIP_DB_CREATE:    "false"
        ports: ["7233:7233"]
        options: >-
          --health-cmd "nc -z localhost 7233 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run migrations
        run: |
          PGPASSWORD=password psql -h localhost -U achuser -d ach_db -f internal/db/migrations/001_create_payments.up.sql
          PGPASSWORD=password psql -h localhost -U achuser -d ach_db -f internal/db/migrations/002_create_return_events.up.sql
          PGPASSWORD=password psql -h localhost -U achuser -d ach_db -f internal/db/migrations/003_create_audit_log.up.sql
          PGPASSWORD=password psql -h localhost -U achuser -d ach_db -f internal/db/migrations/004_phase3_audit_columns.sql
          PGPASSWORD=password psql -h localhost -U achuser -d ach_db -f internal/db/migrations/005_drop_payment_audit_log.up.sql

      - name: Wait for Temporal to be ready
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7233; then
              echo "Temporal is ready"
              sleep 5
              break
            fi
            echo "Waiting for Temporal... attempt $i"
            sleep 5
          done

      - name: go vet
        run: go vet ./...

      - name: golint
        run: |
          go install golang.org/x/lint/golint@latest
          golint -set_exit_status ./...

      - name: Unit tests
        run: go test -v -count=1 -run "^Test[^I]" ./...

      - name: Integration tests
        run: go test -v -count=1 -timeout 120s -tags integration -run "^TestIntegration" -skip "TestIntegration_R01_ExhaustedRetries" ./tests/...
        env:
          DATABASE_URL:       postgres://achuser:password@localhost:5432/ach_db?sslmode=disable
          TEST_DB_URL:        postgres://achuser:password@localhost:5432/ach_db?sslmode=disable
          TEST_REDIS_ADDR:    localhost:6379
          TEST_TEMPORAL_ADDR: localhost:7233
          REDIS_ADDR:         localhost:6379
          TEMPORAL_HOST_PORT: localhost:7233

  build-push:
    name: Build + Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push
        id: build
        env:
          REGISTRY:   ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG:  ${{ github.sha }}
        run: |
          IMAGE="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          docker build --platform linux/amd64 -t "$IMAGE" -t "$REGISTRY/$ECR_REPO:latest" .
          docker push "$IMAGE"
          docker push "$REGISTRY/$ECR_REPO:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Force new deployment — server
        run: |
          aws ecs update-service \
            --cluster  "$ECS_CLUSTER" \
            --service  "$SERVER_SVC" \
            --force-new-deployment \
            --region   "$AWS_REGION"

      - name: Force new deployment — worker
        run: |
          aws ecs update-service \
            --cluster  "$ECS_CLUSTER" \
            --service  "$WORKER_SVC" \
            --force-new-deployment \
            --region   "$AWS_REGION"

      - name: Wait for server service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$SERVER_SVC" \
            --region  "$AWS_REGION"

      - name: Wait for worker service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$WORKER_SVC" \
            --region  "$AWS_REGION"